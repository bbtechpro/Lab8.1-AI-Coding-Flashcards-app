<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards App</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <h1>Flashcards</h1>
        <nav><button id="new-deck-btn">New Deck</button></nav>
    </header>

    <div class="app-container">
        <aside id="sidebar" role="complementary" aria-label="Decks sidebar">
            <h2>Decks</h2>
            <ul id="decks-list"></ul>
        </aside>

        <main id="main-content" role="main">
            <section id="cards-section">
                <!-- Inside <main id="main-content">, update the toolbar -->
                <div class="toolbar">
                    <h2 id="current-deck-title">Select a Deck</h2>
                    <div class="controls">
                        <div class="search-container">
                            <input type="text" id="search-bar" placeholder="Search cards..." aria-label="Search cards">
                            <button id="search-btn" disabled>🔍</button>
                        </div>
                        <button id="shuffle-btn" disabled>Shuffle</button>
                        <button id="add-card-btn" disabled>New Card</button>
                    </div>
                </div>

                <div id="cards-container"></div>
            </section>
        </main>
    </div>

    <!-- Universal Modal for Decks and Cards -->
    <div id="modal-overlay" class="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <h2 id="modal-title">Edit</h2>
            <form id="modal-form">
                <div id="deck-fields">
                    <label for="deck-name">Deck Name</label>
                    <input type="text" id="deck-name">
                </div>
                <div id="card-fields" hidden>
                    <label for="card-front">Front</label>
                    <textarea id="card-front"></textarea>
                    <label for="card-back">Back</label>
                    <textarea id="card-back"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel">Cancel</button>
                    <button type="submit" id="modal-save">Save</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
